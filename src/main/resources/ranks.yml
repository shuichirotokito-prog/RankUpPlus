# =============================================
#   PRESTIGE CONFIGURATION
# =============================================
prestige:
  enabled: true
  max-prestige: 10
  reset-rank: true          # Reset rank back to DEFAULT on prestige
  keep-balance: false       # Keep money on prestige
  reset-stats: false        # Reset playtime/kills/deaths/blocks broken+placed on prestige.
  # Set true if you want rank requirements (e.g. "2h Playtime")
  # to need to be earned again after every prestige.
  cost-multiplier: 1.5      # Each prestige multiplies all rank costs by this

  display-format: "&5[P{prestige}]"

  rewards-per-prestige:
    1:
      commands:
        - "give {player} diamond_block 10"
    5:
      commands:
        - "give {player} beacon 1"
    10:
      commands:
        - "give {player} nether_star 3"
