# =============================================
#   RANK LADDER CONFIGURATION
# =============================================
# Ranks are processed in the order they appear below. Each rank can have:
#   display:          Display name (supports color codes)
#   color:            Single chat color CODE CHARACTER for this rank (e.g. "a", "c", "5") —
#                      not a full "&a" code, just the character after the &.
#   permission:       LuckPerms group to assign on reaching this rank
#   cost:             Money/XP cost to rank up FROM this rank to the next
#   requirements:     List of extra requirements (see REQUIREMENT TYPES below)
#   commands:         Console commands run on rankup, for the rank being reached
#   player-commands:  Commands run as the player on rankup, for the rank being reached
#   rewards:          Items given on rankup, for the rank being reached
#   prestige:         Whether reaching this rank triggers a prestige reset
#
# =============================================
#   REQUIREMENT TYPES
# =============================================
# Set "type" to one of these in a rank's requirements list. "value" and
# "display" apply to every type; some types need extra fields too.
#
#   PLAYTIME       value: minutes of playtime (tracked by RankUpPlus itself)
#   KILLS          value: player kills (tracked by RankUpPlus itself)
#   DEATHS         value: deaths (tracked by RankUpPlus itself)
#   BALANCE        value: a Vault economy balance required, ON TOP OF the rank cost
#                  (the rank cost is always checked; this is an extra floor —
#                  e.g. cost: 1000 + a BALANCE requirement of 5000 means the
#                  player needs 6000 total: 1000 gets spent, 5000 stays untouched)
#   LEVEL          value: Minecraft XP level
#   BLOCKS_BROKEN  value: total blocks broken (tracked since this plugin was installed —
#                  there's no single built-in Bukkit statistic for this across all block types)
#   BLOCKS_PLACED  value: total blocks placed (tracked since this plugin was installed, same reason)
#   PERMISSION     permission: the permission node to check (value/display still apply,
#                  but value is unused for this type — only presence of the permission matters)
#   STATISTIC      statistic: name of an UNQUALIFIED org.bukkit.Statistic — one that doesn't
#                  need a Material/EntityType qualifier. Useful ones: JUMP, PLAYER_KILLS,
#                  PLAY_ONE_MINUTE, DAMAGE_DEALT, DAMAGE_TAKEN, MOB_KILLS, FISH_CAUGHT,
#                  ANIMALS_BRED, TIME_SINCE_DEATH, DROP_COUNT. Statistics that need a
#                  qualifier (like MINE_BLOCK for a specific block type) are NOT supported
#                  here — use BLOCKS_BROKEN/BLOCKS_PLACED for general block totals instead.
#   CUSTOM         always counted as met; for purely informational/display requirements
#                  (e.g. showing "&6Must apply via Discord" as a line with nothing to check)
#
# Examples:
#   - type: PERMISSION
#     permission: "myserver.vip"
#     display: "&6VIP Status"
#   - type: BALANCE
#     value: 50000
#     display: "&a$50,000 in the bank (on top of rank cost)"
#   - type: STATISTIC
#     statistic: PLAYER_KILLS
#     value: 25
#     display: "&c25 Player Kills (statistic-based)"
# =============================================

ranks:
  DEFAULT:
    display: "Default"
    color: "7"
    permission: "default"
    lore:
      - "&7The starting rank for all players."
    cost: 1000
    requirements: []
    commands: []
    player-commands: []
    rewards: []

